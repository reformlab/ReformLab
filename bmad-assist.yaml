# bmad-assist configuration for ReformLab
# Strategy: Opus for creative/complex work, Gemini for validation/review (reduce bias + cost)

project_name: ReformLab
user_name: Lucas
communication_language: English
document_output_language: English
user_skill_level: intermediate

timeouts:
  default: 600
  retries: 2
  create_story: 900
  validate_story_synthesis: 900
  dev_story: 3600
  code_review_synthesis: 1200

providers:
  master:
    provider: claude
    model: opus

  helper:
    provider: claude
    model: haiku

  multi:
    - provider: gemini
      model: gemini-2.5-flash

# Per-phase model assignment
# Principle: Opus creates, Gemini validates/reviews (different model = less blind spots)
phase_models:
  # --- Creative phases: Opus (needs deep reasoning) ---
  create_story:
    provider: claude
    model: opus
  dev_story:
    provider: claude
    model: opus

  # --- Validation phases: Gemini (independent perspective, free tier) ---
  validate_story:
    - provider: gemini
      model: gemini-2.5-flash
  validate_story_synthesis:
    provider: gemini
    model: gemini-2.5-flash

  # --- Review phases: Gemini (catches what Opus missed) ---
  code_review:
    - provider: gemini
      model: gemini-2.5-flash
  code_review_synthesis:
    provider: gemini
    model: gemini-2.5-flash

  # --- Retrospective: Sonnet (good enough, saves Opus tokens) ---
  retrospective:
    provider: claude
    model: sonnet

# Compiler configuration
compiler:
  source_context:
    budgets:
      create_story: 60000
      validate_story: 15000
      validate_story_synthesis: 15000
      dev_story: 15000
      code_review: 30000
      code_review_synthesis: 30000
      default: 30000

  strategic_context:
    budget: 15000
    tree_budget: 0
    defaults:
      include: [project-tree, project-context, architecture]
      main_only: true
    create_story:
      include: [project-tree, project-context, architecture, prd]
    dev_story:
      include: [project-tree, project-context, architecture, prd]
    code_review:
      include: [project-tree, project-context, architecture, prd]

# Loop: standard cycle, no TEA
loop:
  story:
    - create_story
    - validate_story
    - validate_story_synthesis
    - dev_story
    - code_review
    - code_review_synthesis
  epic_teardown:
    - retrospective

testarch:
  enabled: false

deep_verify:
  enabled: false

security_agent:
  enabled: false
