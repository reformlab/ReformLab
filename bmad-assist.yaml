# bmad-assist configuration for ReformLab
# Strategy: Claude-only (Opus creates/devs, Sonnet validates/reviews)

project_name: ReformLab
user_name: Lucas
communication_language: English
document_output_language: English
user_skill_level: intermediate

timeouts:
  default: 600
  retries: 2
  create_story: 900
  validate_story_synthesis: 900
  dev_story: 3600
  code_review_synthesis: 1200

providers:
  master:
    provider: claude
    model: opus

  helper:
    provider: claude
    model: haiku

# Per-phase model assignment
# Opus creates/devs, Sonnet validates/reviews (different model = less bias)
phase_models:
  # --- Creative phases: Opus ---
  create_story:
    provider: claude
    model: opus
  dev_story:
    provider: claude
    model: opus

  # --- Validation phases: Sonnet + Haiku (2 required) ---
  validate_story:
    - provider: claude
      model: sonnet
    - provider: claude
      model: haiku
  validate_story_synthesis:
    provider: claude
    model: sonnet

  # --- Review phases: Sonnet + Haiku (2 required) ---
  code_review:
    - provider: claude
      model: sonnet
    - provider: claude
      model: haiku
  code_review_synthesis:
    provider: claude
    model: sonnet

  # --- Retrospective: Sonnet ---
  retrospective:
    provider: claude
    model: sonnet

# Compiler configuration
compiler:
  source_context:
    budgets:
      create_story: 60000
      validate_story: 15000
      validate_story_synthesis: 15000
      dev_story: 15000
      code_review: 30000
      code_review_synthesis: 30000
      default: 30000

  strategic_context:
    budget: 15000
    tree_budget: 0
    defaults:
      include: [project-tree, project-context, architecture]
      main_only: true
    create_story:
      include: [project-tree, project-context, architecture, prd]
    dev_story:
      include: [project-tree, project-context, architecture, prd]
    code_review:
      include: [project-tree, project-context, architecture, prd]

# Loop: standard cycle, no TEA
loop:
  story:
    - create_story
    - validate_story
    - validate_story_synthesis
    - dev_story
    - code_review
    - code_review_synthesis
  epic_teardown:
    - retrospective

testarch:
  enabled: false

deep_verify:
  enabled: false

security_agent:
  enabled: false
