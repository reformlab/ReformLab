# bmad-assist configuration for ReformLab
# Strategy: Opus creates/devs, Codex + Sonnet validate/review

project_name: ReformLab
user_name: Lucas
communication_language: English
document_output_language: English
user_skill_level: intermediate

timeouts:
  default: 600
  retries: 2
  create_story: 900
  dev_story: 3600

providers:
  master:
    provider: claude-subprocess
    model: opus

  helper:
    provider: claude-subprocess
    model: haiku

# Per-phase model assignment
# Opus creates/devs, Sonnet validates/reviews (different model = less bias)
phase_models:
  # --- Creative phases: Opus ---
  create_story:
    provider: claude-subprocess
    model: opus
  dev_story:
    provider: claude-subprocess
    model: opus

  # --- Validation phases: Codex + Sonnet (two reviewers for synthesis) ---
  validate_story:
    - provider: codex
      model: gpt-5.1-codex-max
    - provider: claude-subprocess
      model: sonnet

  # --- Review phases: Codex + Sonnet (two reviewers for synthesis) ---
  code_review:
    - provider: codex
      model: gpt-5.1-codex-max
    - provider: claude-subprocess
      model: sonnet

  # --- Retrospective: Sonnet ---
  retrospective:
    provider: claude-subprocess
    model: sonnet

# Compiler configuration — moderate token optimization
# Reduced budgets to cut prompt size ~40% without losing critical context
compiler:
  source_context:
    budgets:
      create_story: 30000    # was 60000 — story creation needs less code
      validate_story: 10000  # was 15000
      dev_story: 15000       # unchanged — dev needs code context most
      code_review: 20000     # was 30000
      default: 15000         # was 30000

  strategic_context:
    budget: 8000             # was 15000 — most docs are partially redundant
    tree_budget: 0
    defaults:
      include: [project-tree, project-context, architecture]
      main_only: true
    create_story:
      include: [project-tree, project-context, architecture, prd]
    dev_story:
      include: [project-tree, project-context, architecture]  # removed prd — dev doesn't need product spec
    code_review:
      include: [project-tree, project-context, architecture]  # removed prd — reviewer needs code, not product spec

# Loop: standard cycle, no TEA
loop:
  story:
    - create_story
    - validate_story
    - validate_story_synthesis
    - dev_story
    - code_review
    - code_review_synthesis
  epic_teardown:
    - retrospective

testarch:
  enabled: false

deep_verify:
  enabled: false

security_agent:
  enabled: false
