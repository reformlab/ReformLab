$schema: "../../../schema/scenario-template.schema.json"
version: "1.0"

name: "Carbon Tax - Progressive Rate with Progressive Dividend"
description: >
  Maximum progressivity scenario: combines income-based tax rates (higher-income
  households pay higher rates) with income-weighted redistribution (lower-income
  households receive larger dividends). This dual mechanism provides the strongest
  redistributive impact while maintaining carbon price incentives.
policy_type: carbon_tax

year_schedule:
  start_year: 2026
  end_year: 2036

parameters:
  rate_schedule:
    # Base EUR per tonne CO2 - effective rate varies by income
    2026: 44.60
    2027: 50.00
    2028: 55.00
    2029: 60.00
    2030: 65.00
    2031: 70.00
    2032: 75.00
    2033: 80.00
    2034: 85.00
    2035: 90.00
    2036: 100.00

  covered_categories:
    - "transport_fuel"    # Gasoline, diesel
    - "heating_fuel"      # Heating oil
    - "natural_gas"       # Natural gas for heating/cooking

  exemptions: []

  redistribution:
    type: "progressive_dividend"
    income_weights:
      # Weights for progressive redistribution
      # Lower deciles receive higher share of total revenue
      decile_1: 1.5    # Bottom 10% income - highest share
      decile_2: 1.3
      decile_3: 1.2
      decile_4: 1.1
      decile_5: 1.0    # Median income - baseline weight
      decile_6: 0.9
      decile_7: 0.8
      decile_8: 0.7
      decile_9: 0.5
      decile_10: 0.2   # Top 10% income - lowest share

  # Rate multipliers for progressive taxation (applied during computation)
  # Note: This is a secondary income_weights structure for tax rate adjustment
  # In this variant, both mechanisms are active:
  # 1. Tax rate multipliers make higher earners pay more tax
  # 2. Redistribution weights give lower earners more dividend
  thresholds:
    - name: "progressive_rate_multipliers"
      decile_1: 0.5
      decile_2: 0.6
      decile_3: 0.7
      decile_4: 0.8
      decile_5: 0.9
      decile_6: 1.0
      decile_7: 1.1
      decile_8: 1.2
      decile_9: 1.4
      decile_10: 1.5
