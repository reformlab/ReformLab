$schema: "../../../schema/scenario-template.schema.json"
version: "1.0"

name: "Carbon Tax - Flat Rate, No Redistribution"
description: >
  Uniform carbon tax with a single rate per tonne CO2 applied to all covered
  energy categories. All tax revenue is retained by government (no redistribution).
  This variant serves as a baseline for comparing redistribution mechanisms.
policy_type: carbon_tax

year_schedule:
  start_year: 2026
  end_year: 2036

parameters:
  rate_schedule:
    # EUR per tonne CO2 - based on EU ETS and French carbon tax trajectory
    2026: 44.60
    2027: 50.00
    2028: 55.00
    2029: 60.00
    2030: 65.00
    2031: 70.00
    2032: 75.00
    2033: 80.00
    2034: 85.00
    2035: 90.00
    2036: 100.00

  covered_categories:
    - "transport_fuel"    # Gasoline, diesel
    - "heating_fuel"      # Heating oil
    - "natural_gas"       # Natural gas for heating/cooking

  exemptions: []

  # No redistribution - all revenue retained
