name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Kamal
        run: gem install kamal

      - name: Set up SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HETZNER_HOST_KEY: ${{ secrets.HETZNER_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "$HETZNER_HOST_KEY" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Write Kamal secrets
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          REFORMLAB_PASSWORD: ${{ secrets.REFORMLAB_PASSWORD }}
          HETZNER_IP: ${{ secrets.HETZNER_IP }}
        run: |
          mkdir -p .kamal
          printf 'KAMAL_REGISTRY_PASSWORD=%s\nREFORMLAB_PASSWORD=%s\nHETZNER_IP=%s\n' \
            "$KAMAL_REGISTRY_PASSWORD" "$REFORMLAB_PASSWORD" "$HETZNER_IP" > .kamal/secrets

      - name: Generate Dozzle users file
        env:
          REFORMLAB_PASSWORD: ${{ secrets.REFORMLAB_PASSWORD }}
        run: |
          docker run --rm amir20/dozzle generate admin --password "$REFORMLAB_PASSWORD" --name Admin > config/dozzle-users.yml

      - name: Deploy with Kamal
        run: kamal deploy

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Kamal
        run: gem install kamal

      - name: Set up SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HETZNER_HOST_KEY: ${{ secrets.HETZNER_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "$HETZNER_HOST_KEY" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
        run: |
          echo "$KAMAL_REGISTRY_PASSWORD" | docker login ghcr.io -u reformlab --password-stdin

      - name: Build and push frontend image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t ghcr.io/reformlab/reformlab-frontend:latest \
            --push \
            -f frontend/Dockerfile \
            .

      - name: Write Kamal secrets
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          REFORMLAB_PASSWORD: ${{ secrets.REFORMLAB_PASSWORD }}
          HETZNER_IP: ${{ secrets.HETZNER_IP }}
        run: |
          mkdir -p .kamal
          printf 'KAMAL_REGISTRY_PASSWORD=%s\nREFORMLAB_PASSWORD=%s\nHETZNER_IP=%s\n' \
            "$KAMAL_REGISTRY_PASSWORD" "$REFORMLAB_PASSWORD" "$HETZNER_IP" > .kamal/secrets

      - name: Reboot frontend accessory
        run: kamal accessory reboot frontend

  deploy-website:
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Kamal
        run: gem install kamal

      - name: Set up SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HETZNER_HOST_KEY: ${{ secrets.HETZNER_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "$HETZNER_HOST_KEY" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
        run: |
          echo "$KAMAL_REGISTRY_PASSWORD" | docker login ghcr.io -u reformlab --password-stdin

      - name: Build and push website image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t ghcr.io/reformlab/reformlab-website:latest \
            --push \
            website

      - name: Write Kamal secrets
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          REFORMLAB_PASSWORD: ${{ secrets.REFORMLAB_PASSWORD }}
          HETZNER_IP: ${{ secrets.HETZNER_IP }}
        run: |
          mkdir -p .kamal
          printf 'KAMAL_REGISTRY_PASSWORD=%s\nREFORMLAB_PASSWORD=%s\nHETZNER_IP=%s\n' \
            "$KAMAL_REGISTRY_PASSWORD" "$REFORMLAB_PASSWORD" "$HETZNER_IP" > .kamal/secrets

      - name: Reboot website accessory
        run: kamal accessory reboot website

  deploy-monitoring:
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Kamal
        run: gem install kamal

      - name: Set up SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HETZNER_HOST_KEY: ${{ secrets.HETZNER_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "$HETZNER_HOST_KEY" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Write Kamal secrets
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          REFORMLAB_PASSWORD: ${{ secrets.REFORMLAB_PASSWORD }}
          HETZNER_IP: ${{ secrets.HETZNER_IP }}
        run: |
          mkdir -p .kamal
          printf 'KAMAL_REGISTRY_PASSWORD=%s\nREFORMLAB_PASSWORD=%s\nHETZNER_IP=%s\n' \
            "$KAMAL_REGISTRY_PASSWORD" "$REFORMLAB_PASSWORD" "$HETZNER_IP" > .kamal/secrets

      - name: Generate Dozzle users file
        env:
          REFORMLAB_PASSWORD: ${{ secrets.REFORMLAB_PASSWORD }}
        run: |
          docker run --rm amir20/dozzle generate admin --password "$REFORMLAB_PASSWORD" --name Admin > config/dozzle-users.yml

      - name: Reboot monitoring accessories
        run: |
          kamal accessory reboot dozzle
          kamal accessory reboot glances
