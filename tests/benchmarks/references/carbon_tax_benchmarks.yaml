# Benchmark reference values for carbon tax simulations
#
# Each benchmark includes:
# - value: Expected numeric result
# - tolerance: Acceptable relative deviation (e.g., 0.02 = ±2%)
# - source: Reference source or derivation method
# - notes: Additional context or assumptions

fiscal_aggregates:
  # Aggregate carbon tax revenue at EUR 44/tCO2
  carbon_tax_revenue_44_euro:
    value: 9_896_059_907.615585  # EUR/year for deterministic 100k benchmark fixture
    tolerance: 0.02  # ±2%
    source: "Derived from deterministic benchmark fixture (seed=42) and EUR44/tCO2 rate"
    notes: |
      Value computed from the exact fixture generation in tests/benchmarks/conftest.py
      and simplified benchmark formula: tax = sum(energy columns) * 44.
      Tolerance accounts for minor floating-point variation across environments.

