# Benchmark reference values for carbon tax simulations
#
# Each benchmark includes:
# - value: Expected numeric result
# - tolerance: Acceptable relative deviation (e.g., 0.02 = ±2%)
# - source: Reference source or derivation method
# - notes: Additional context or assumptions

fiscal_aggregates:
  # Aggregate carbon tax revenue at EUR 44/tCO2
  carbon_tax_revenue_44_euro:
    value: 30_800_000  # EUR/year for 100k households
    tolerance: 0.05  # ±5% (wider tolerance for aggregate)
    source: "Derived from synthetic population: 100k households × 7 tCO2/year avg × 44 EUR/tCO2"
    notes: |
      This benchmark uses a synthetic population with average household emissions
      of ~7 tCO2/year. The expected revenue is calculated as:
      100,000 households × 7 tCO2/household × 44 EUR/tCO2 = 30,800,000 EUR/year

      Wider tolerance (±5%) accounts for distributional variation in the
      synthetic population generation.

distributional_shares:
  # Share of total carbon tax burden borne by each income decile
  # These values are derived from the synthetic population generator
  # and represent the expected distributional pattern.

  decile_1_share:
    value: 0.08  # 8% of total tax burden
    tolerance: 0.15  # ±15% (wider tolerance for distributional metrics)
    source: "Derived from synthetic population with emissions correlated to income"
    notes: |
      Decile 1 (lowest income) bears approximately 8% of total carbon tax burden.
      Wider tolerance reflects uncertainty in distributional patterns.

  decile_5_share:
    value: 0.10  # 10% of total tax burden
    tolerance: 0.15  # ±15%
    source: "Derived from synthetic population with emissions correlated to income"
    notes: "Middle-income households (decile 5) bear approximately 10% of burden."

  decile_10_share:
    value: 0.12  # 12% of total tax burden
    tolerance: 0.15  # ±15%
    source: "Derived from synthetic population with emissions correlated to income"
    notes: |
      Decile 10 (highest income) bears approximately 12% of total carbon tax burden.
      The relatively flat distribution reflects the assumption that carbon
      emissions are only moderately correlated with income in the synthetic
      population.
