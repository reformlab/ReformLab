$schema: "./schema/scenario-template.schema.json"
version: "1.0"

name: "French Carbon Tax 2026"
description: "Golden file: standard French carbon tax baseline scenario for validation"
policy_type: carbon_tax

year_schedule:
  start_year: 2026
  end_year: 2036

policy:
  rate_schedule:
    2026: 44.60
    2027: 50.00
    2028: 55.00
    2029: 60.00
    2030: 65.00
    2031: 70.00
    2032: 75.00
    2033: 80.00
    2034: 85.00
    2035: 90.00
    2036: 100.00
  exemptions:
    - category: "heating_oil_essential"
      rate_reduction: 0.5
    - category: "agricultural_fuel"
      rate_reduction: 1.0
  covered_categories:
    - "transport_fuel"
    - "heating_fuel"
    - "natural_gas"
