# Kamal 2 deployment configuration for ReformLab
# Docs: https://kamal-deploy.org/docs/configuration/

service: reformlab

# Docker image name on GitHub Container Registry
image: reformlab/reformlab

servers:
  web:
    hosts:
      - "%{HETZNER_IP}"

proxy:
  ssl: true
  host: api.reform-lab.eu
  app_port: 8000

registry:
  server: ghcr.io
  username: reformlab
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: arm64

volumes:
  - /data/reformlab:/app/data

env:
  clear:
    REFORMLAB_DATA_DIR: /app/data
  secret:
    - REFORMLAB_PASSWORD

accessories:
  frontend:
    image: ghcr.io/reformlab/reformlab-frontend
    hosts:
      - "%{HETZNER_IP}"
    port: 8080:8080
    proxy:
      ssl: true
      host: app.reform-lab.eu
      app_port: 8080
  website:
    image: ghcr.io/reformlab/reformlab-website
    hosts:
      - "%{HETZNER_IP}"
    port: 8090:8090
    proxy:
      ssl: true
      hosts:
        - www.reform-lab.eu
        - reform-lab.eu
      app_port: 8090
  dozzle:
    image: amir20/dozzle:latest
    hosts:
      - "%{HETZNER_IP}"
    port: 9080:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env:
      clear:
        DOZZLE_AUTH_PROVIDER: simple
    files:
      - config/dozzle-users.yml:/data/users.yml:ro
    proxy:
      ssl: true
      host: logs.reform-lab.eu
      app_port: 8080
  glances:
    image: nicolargo/glances:latest
    hosts:
      - "%{HETZNER_IP}"
    port: 9081:61208
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    options:
      pid: host
    env:
      clear:
        GLANCES_OPT: "-w"
    proxy:
      ssl: true
      host: monitor.reform-lab.eu
      app_port: 61208
      healthcheck:
        path: /api/4/status
        interval: 5
