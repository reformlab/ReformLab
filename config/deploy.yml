# Kamal 2 deployment configuration for ReformLab
# Docs: https://kamal-deploy.org/docs/configuration/

service: reformlab

# Docker image name on GitHub Container Registry
image: reformlab/reformlab

servers:
  web:
    hosts:
      - 178.104.67.235

proxy:
  ssl: true
  host: api.reform-lab.eu
  app_port: 8000

registry:
  server: ghcr.io
  username: reformlab
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: arm64

volumes:
  - /data/reformlab:/app/data

env:
  clear:
    REFORMLAB_DATA_DIR: /app/data
  secret:
    - REFORMLAB_PASSWORD

accessories:
  frontend:
    image: ghcr.io/reformlab/reformlab-frontend
    hosts:
      - 178.104.67.235
    port: 8080:8080
    proxy:
      ssl: true
      host: reform-lab.eu
      app_port: 8080
