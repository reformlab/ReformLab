# Kamal 2 deployment configuration for ReformLab
# Docs: https://kamal-deploy.org/docs/configuration/

service: reformlab

# Docker image name on GitHub Container Registry
image: reformlab/reformlab

servers:
  web:
    hosts:
      - 178.104.67.235
    options:
      network: private
    labels:
      traefik.http.routers.reformlab-api.rule: Host(`api.reformlab.fr`)
      traefik.http.routers.reformlab-api.tls: true
      traefik.http.routers.reformlab-api.tls.certresolver: letsencrypt

proxy:
  ssl: true
  host: api.reformlab.fr

registry:
  server: ghcr.io
  username: reformlab
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64

volumes:
  - /data/reformlab:/app/data

env:
  clear:
    REFORMLAB_DATA_DIR: /app/data
  secret:
    - AUTH_PASSWORD

accessories:
  frontend:
    image: reformlab/reformlab-frontend
    host: 178.104.67.235
    port: 8080
    labels:
      traefik.http.routers.reformlab-app.rule: Host(`app.reformlab.fr`)
      traefik.http.routers.reformlab-app.tls: true
      traefik.http.routers.reformlab-app.tls.certresolver: letsencrypt

traefik:
  options:
    publish:
      - "443:443"
      - "80:80"
    volume:
      - "/letsencrypt:/letsencrypt"
  args:
    entryPoints.web.address: ":80"
    entryPoints.websecure.address: ":443"
    entryPoints.web.http.redirections.entryPoint.to: websecure
    entryPoints.web.http.redirections.entryPoint.scheme: https
    certificatesResolvers.letsencrypt.acme.email: "lucas@reformlab.fr"
    certificatesResolvers.letsencrypt.acme.storage: "/letsencrypt/acme.json"
    certificatesResolvers.letsencrypt.acme.httpChallenge.entryPoint: web
