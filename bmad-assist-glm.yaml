# bmad-assist configuration for ReformLab
# Strategy: GLM-5 creates/devs/synth/retro, Gemini+GLM-5+Codex validate/review

project_name: ReformLab
user_name: Lucas
communication_language: English
document_output_language: English
user_skill_level: intermediate

tool_guard:
  max_total_calls: 400
  max_interactions_per_file: 25
  max_calls_per_minute: 150

timeouts:
  default: 600
  retries: 2
  create_story: 900
  dev_story: 3600

providers:
  master:
    provider: claude-subprocess # or claude-sdk
    model: opus # Fastest master model

  helper:
    provider: claude-subprocess
    model: haiku

# Per-phase model assignment
# GLM-5 creates/devs/synth/retro, Gemini+GLM-5+Codex validate/review
phase_models:
  # --- Creative phases: GLM-5 ---
  create_story:
    provider: claude-subprocess
    model: opus
  dev_story:
    provider: claude-subprocess
    model: opus

  # --- Validation phases: Gemini + GLM-5 + Codex (three reviewers for synthesis) ---
  validate_story:
    - provider: gemini
      model: gemini-2.5-flash
    - provider: codex
      model: gpt-5.3-codex
      reasoning_effort: high
  validate_story_synthesis:
    provider: claude-subprocess
    model: opus

  # --- Review phases: Gemini + GLM-5 + Codex (three reviewers for synthesis) ---
  code_review:
    - provider: gemini
      model: gemini-2.5-flash
    - provider: codex
      model: gpt-5.3-codex
      reasoning_effort: high
  code_review_synthesis:
    provider: claude-subprocess
    model: opus

  # --- Retrospective: GLM-5 ---
  retrospective:
    provider: claude-subprocess
    model: opus

# Compiler configuration — balanced budgets
# Restored closer to defaults after synthesis starvation warnings (2026-03-03).
# Architecture doc alone is ~14k tokens; 8k strategic budget was truncating it to 47%.
compiler:
  source_context:
    budgets:
      create_story: 100000
      validate_story: 15000
      validate_story_synthesis: 15000
      dev_story: 30000
      code_review: 40000
      code_review_synthesis: 40000
      default: 40000

  strategic_context:
    budget: 20000
    tree_budget: 0
    defaults:
      include: [project-context] # [project-tree, project-context, architecture]
      main_only: true
    create_story:
      include: [project-context] # [project-tree, project-context, architecture, prd]
    dev_story:
      include: [project-context] # [project-tree, project-context, architecture]
    code_review:
      include: [project-context] # project-tree, project-context, architecture]

# Loop: standard cycle with synthesis, no TEA
loop:
  story:
    - create_story
    - validate_story
    - validate_story_synthesis
    - dev_story
    - code_review
    - code_review_synthesis
  epic_teardown:
    - retrospective

testarch:
  enabled: false

deep_verify:
  enabled: false

security_agent:
  enabled: false
