<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 384" role="img" aria-labelledby="title desc">
  <title id="title">Reform Lab icon</title>
  <desc id="desc">A Reform Lab icon built from two overlapping pointed ovals with a rounded teal intersection.</desc>
  <defs>
     <path
      id="left-lens"
      d="M 30 192
         C 118 92 246 58 380 78
         A 114 114 0 0 1 380 306
         C 246 326 118 292 30 192 Z"
    />
    <path
      id="right-lens"
      d="M 610 192
         C 522 92 394 58 260 78
         A 114 114 0 0 0 260 306
         C 394 326 522 292 610 192 Z"
    />
    <clipPath id="clip-right">
      <use href="#right-lens" />
    </clipPath>
  </defs>

  <use href="#left-lens" fill="#334155" />
  <use href="#right-lens" fill="#10B981" />
  <use href="#left-lens" clip-path="url(#clip-right)" fill="#217D6B" />
</svg>
