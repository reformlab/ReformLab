site_name: ReformLab Documentation
site_description: OpenFisca-first environmental policy analysis platform
site_url: ""  # Set to https://reformlab.github.io/reformlab/ for GitHub Pages

repo_url: https://github.com/reformlab/reformlab
repo_name: reformlab/reformlab

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
      - Project Overview: project-overview.md
      - Development Guide: development-guide.md
      - Deployment Guide: deployment-guide.md
  - Architecture:
      - System Architecture: architecture.md
      - Source Tree: source-tree-analysis.md
  - Product:
      - Requirements (PRD): prd.md
      - UX Design: ux-design-specification.md
      - Epics & Stories: epics.md
  - Quality:
      - Phase 1 Exit Checklist: phase-1-exit-checklist.md
      - Pilot Checklist: pilot-checklist.md
      - Compatibility: compatibility.md
  - Reference:
      - Planning Artifacts: planning-artifacts-inventory.md
      - Project Context: project-context.md
